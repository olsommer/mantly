name: Finalize capacity branch

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: ["main"]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/09-scaling'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Apply correction
        run: python3 scripts/fix_capacity_branch.py

      - name: Remove one-shot assets
        run: rm -f .github/workflows/fix-capacity-branch.yml scripts/fix_capacity_branch.py

      - name: Validate corrected files
        run: |
          python3 -m py_compile scripts/load_test.py backend/tests/test_load_test_tool.py
          grep -q '^import sys$' scripts/load_test.py
          grep -q 'sys.modules\[spec.name\] = module' backend/tests/test_load_test_tool.py

      - name: Commit correction
        run: |
          set -euo pipefail
          git config user.name "mantly-maintenance[bot]"
          git config user.email "mantly-maintenance[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "test: fix capacity harness module loading"
          git push origin "HEAD:${{ github.head_ref }}"
