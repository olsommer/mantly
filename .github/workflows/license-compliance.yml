name: License and distribution compliance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: license-compliance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-rights-contract:
    name: Repository rights contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify proprietary rights and contribution boundary
        run: |
          set -euo pipefail
          test -s LICENSE.md
          test -s NOTICE.md
          test -s CONTRIBUTING.md
          test -s docs/decisions/0002-licensing-and-distribution.md
          test -s docs/legal/third-party-licenses.md
          test -s docs/legal/commercial-distribution-checklist.md
          grep -qi "proprietary" LICENSE.md
          grep -qi "not described as open source or source available" docs/decisions/0002-licensing-and-distribution.md
          grep -qi "qualified legal" docs/legal/commercial-distribution-checklist.md

      - name: Reject imprecise public licensing claims
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          roots = [Path('README.md'), Path('docs/product-vision.md')]
          forbidden = (
              'Mantly is open source',
              'Mantly is source available',
              'open-source Mantly',
          )
          failures = []
          for path in roots:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              for phrase in forbidden:
                  if phrase.lower() in text.lower():
                      failures.append(f'{path}: unsupported licensing claim: {phrase}')
          if failures:
              raise SystemExit('\n'.join(failures))
          PY

  third-party-inventory:
    name: Generate locked third-party inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Generate inventory and notice report
        working-directory: backend
        run: |
          set -euo pipefail
          mkdir -p ../dist/license-evidence
          uv run python ../scripts/generate_third_party_notice.py \
            --root .. \
            --json-out ../dist/license-evidence/third-party-inventory.json \
            --markdown-out ../dist/license-evidence/THIRD_PARTY_NOTICES.md
          python -m json.tool ../dist/license-evidence/third-party-inventory.json >/dev/null
          test -s ../dist/license-evidence/THIRD_PARTY_NOTICES.md

      - name: Summarize mandatory review items
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('dist/license-evidence/third-party-inventory.json').read_text(encoding='utf-8'))
          summary = report['summary']
          print(f"components={summary['components']}")
          print(f"noticeReview={summary['noticeReview']}")
          print(f"legalReviewRequired={summary['legalReviewRequired']}")
          assert summary['components'] > 0
          PY

      - name: Upload release review evidence
        uses: actions/upload-artifact@v4
        with:
          name: third-party-license-inventory
          path: dist/license-evidence
          if-no-files-found: error
          retention-days: 30

  customer-package-rights:
    name: Customer package rights assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify customer package script references legal assets
        run: |
          set -euo pipefail
          grep -q "LICENSE.md" scripts/package-customer.sh
          grep -q "NOTICE.md" scripts/package-customer.sh
          grep -q "THIRD_PARTY_NOTICES.md" scripts/package-customer.sh
          grep -q "third-party-inventory.json" scripts/package-customer.sh
          grep -q '"licensing"' scripts/package-customer.sh
