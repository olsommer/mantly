name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository history and pull-request changes
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-dependency-audit:
    name: Python production dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tooling
        run: python -m pip install --disable-pip-version-check uv pip-audit

      - name: Export locked production requirements
        working-directory: backend
        run: >
          uv export
          --frozen
          --no-dev
          --no-emit-project
          --format requirements-txt
          --output-file /tmp/mantly-production-requirements.txt

      - name: Audit locked production requirements
        run: >
          pip-audit
          --requirement /tmp/mantly-production-requirements.txt
          --progress-spinner off
          --strict

  node-dependency-audit:
    name: Node production audit (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin, addin, landing]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install locked dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        working-directory: ${{ matrix.app }}
        run: npm audit --omit=dev --audit-level=high

  dockerfile-and-compose-scan:
    name: Container configuration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository configuration
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          hide-progress: true

  security-policy-check:
    name: Security policy contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required security documentation
        run: |
          set -euo pipefail
          test -s SECURITY.md
          test -s docs/security/threat-model.md
          test -s docs/security/incident-response.md
          test -s docs/security/data-retention.md
          grep -q "tenant isolation" docs/security/threat-model.md
          grep -q "duplicate side effects" docs/security/incident-response.md
          grep -q "Backups" docs/security/data-retention.md
