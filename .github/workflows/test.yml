name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  AUTOMAIL_BACKGROUND_IO: "disabled"
  GOOGLE_API_KEY: "dummy-ci-key"
  REQUIRE_AUTH: "false"

jobs:
  backend-quality:
    name: Backend lint and type safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff
        working-directory: backend
        run: uv run ruff check automail tests

      - name: Strict Pyright
        working-directory: backend
        run: uv run pyright

  backend-tests:
    name: Backend test suite and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Collect all tests
        working-directory: backend
        run: uv run pytest tests --collect-only -q

      - name: Run full backend suite with coverage
        working-directory: backend
        run: >
          uv run pytest tests
          --cov=automail
          --cov-branch
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=60
          -ra

      - name: Check support package readiness
        working-directory: backend
        run: uv run python -m automail.support.package_gate --root ..

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error
          retention-days: 14

  pocketbase-integration:
    name: PocketBase bootstrap and delivery fencing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PocketBase image
        run: docker build -f pocketbase/Dockerfile -t mantly-pocketbase-integration .

      - name: Start PocketBase
        run: >
          docker run -d --name mantly-pocketbase-integration
          -p 18090:8090
          -e PB_ADMIN_EMAIL=integration@example.com
          -e PB_ADMIN_PASSWORD=integration-password-123456
          mantly-pocketbase-integration

      - name: Wait for PocketBase superuser
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS -X POST http://127.0.0.1:18090/api/collections/_superusers/auth-with-password \
              -H 'Content-Type: application/json' \
              --data '{"identity":"integration@example.com","password":"integration-password-123456"}' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs mantly-pocketbase-integration
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install locked dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Bootstrap schema twice to prove idempotency
        working-directory: backend
        env:
          PB_URL: http://127.0.0.1:18090
          PB_ADMIN_EMAIL: integration@example.com
          PB_ADMIN_PASSWORD: integration-password-123456
        run: |
          uv run python -c 'from automail.db.pocketbase.bootstrap_app_schema import ensure_app_collections_schema; ensure_app_collections_schema()'
          uv run python -c 'from automail.db.pocketbase.bootstrap_app_schema import ensure_app_collections_schema; ensure_app_collections_schema()'

      - name: Run PocketBase/bootstrap tests
        working-directory: backend
        env:
          PB_URL: http://127.0.0.1:18090
          PB_ADMIN_EMAIL: integration@example.com
          PB_ADMIN_PASSWORD: integration-password-123456
        run: >
          uv run pytest
          tests/test_pb_bootstrap.py
          tests/test_tenant_isolation.py
          -v

      - name: Prove atomic delivery claim and fenced completion
        working-directory: backend
        env:
          PB_DELIVERY_HOOK_TEST_URL: http://127.0.0.1:18090
          PB_DELIVERY_HOOK_TEST_EMAIL: integration@example.com
          PB_DELIVERY_HOOK_TEST_PASSWORD: integration-password-123456
        run: uv run pytest tests/test_support_delivery_hook_integration.py -v

      - name: PocketBase logs
        if: failure()
        run: docker logs mantly-pocketbase-integration

      - name: Stop PocketBase
        if: always()
        run: docker rm -f mantly-pocketbase-integration

  frontend-quality:
    name: Frontend quality (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [addin, admin, landing]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install locked dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

  auth-e2e:
    name: Auth and tenant lifecycle E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            addin/package-lock.json
            admin/package-lock.json

      - name: Install add-in dependencies
        working-directory: addin
        run: npm ci

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: addin
        run: npx playwright install --with-deps chromium

      - name: Run real auth lifecycle against PocketBase, API, add-in, and admin
        working-directory: addin
        env:
          CI: "true"
        run: npm run test:e2e:auth

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-e2e-playwright-report
          path: addin/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auth-e2e-service-logs
          path: |
            /tmp/mantly-auth-e2e-backend.log
            /tmp/mantly-auth-e2e-addin.log
            /tmp/mantly-auth-e2e-admin.log
          if-no-files-found: ignore
          retention-days: 14

  docker-build:
    name: Production image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build combined production image
        run: docker build -t mantly-test .

      - name: Build SaaS API image
        run: docker build -f Dockerfile.api -t mantly-api-test .

      - name: Build PocketBase image
        run: docker build -f pocketbase/Dockerfile -t mantly-pocketbase-test .

  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required production-readiness assets
        run: |
          set -euo pipefail
          test -x scripts/check-quality.sh
          test -s README.md
          test -s PILOT_RUNBOOK.md
          test -s docs/v1-scope.md
          test -s docs/pilot-success-criteria.md
          test -s docs/pilot-metrics-schema.json
          test -s docs/merge-order.md
          test -s SECURITY.md
          python -m json.tool docs/pilot-metrics-schema.json >/dev/null

      - name: Reject newly introduced legacy image name
        run: |
          set -euo pipefail
          if grep -R --line-number --exclude-dir=.git --exclude='merge-order.md' 'isarai-test' .; then
            echo 'Legacy isarai-test image name is forbidden.' >&2
            exit 1
          fi
