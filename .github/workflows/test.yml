name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Ruff
        working-directory: backend
        run: uv run ruff check automail tests ../e2e

  unit-tests:
    name: Unit tests (no API calls)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run offline unit tests
        working-directory: backend
        run: >
          uv run pytest
          tests/test_prompt_and_tool.py
          tests/test_draft_manager.py
          tests/test_phishing.py
          tests/test_prompt_injection.py
          tests/test_eval_judge.py
          tests/test_billing_periods.py
          tests/test_agent_run_metering.py
          tests/test_license_security.py
          tests/test_signup_and_license.py
          tests/test_llm_billing.py
          tests/test_refactor_paths.py
          -v

  support-tests:
    name: Support workspace tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run support workspace tests
        working-directory: backend
        run: >
          uv run pytest
          tests/test_support_*.py
          tests/test_e2e_fixture_tools.py
          tests/test_multi_concern_intent.py
          tests/test_pb_bootstrap.py
          tests/test_gmail_addon.py
          tests/test_tenant_isolation.py
          -v

      - name: Check support package readiness
        working-directory: backend
        run: uv run python -m automail.support.package_gate --root ..

  pocketbase-delivery-hook:
    name: PocketBase delivery claim
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PocketBase image
        run: docker build -f pocketbase/Dockerfile -t mantly-pocketbase-hook-test .

      - name: Start PocketBase
        run: >
          docker run -d --name mantly-pocketbase-hook-test
          -p 18090:8090
          -e PB_ADMIN_EMAIL=hooktest@example.com
          -e PB_ADMIN_PASSWORD=hooktest-password-123456
          mantly-pocketbase-hook-test

      - name: Wait for PocketBase superuser
        run: |
          for attempt in {1..30}; do
            if curl -fsS -X POST http://127.0.0.1:18090/api/collections/_superusers/auth-with-password \
              -H 'Content-Type: application/json' \
              --data '{"identity":"hooktest@example.com","password":"hooktest-password-123456"}' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Bootstrap support schema
        working-directory: backend
        env:
          PB_URL: http://127.0.0.1:18090
          PB_ADMIN_EMAIL: hooktest@example.com
          PB_ADMIN_PASSWORD: hooktest-password-123456
        run: >
          uv run python -c
          'from automail.db.pocketbase.bootstrap_app_schema import ensure_app_collections_schema; ensure_app_collections_schema()'

      - name: Prove atomic claim and fenced completion
        working-directory: backend
        env:
          PB_DELIVERY_HOOK_TEST_URL: http://127.0.0.1:18090
          PB_DELIVERY_HOOK_TEST_EMAIL: hooktest@example.com
          PB_DELIVERY_HOOK_TEST_PASSWORD: hooktest-password-123456
        run: uv run pytest tests/test_support_delivery_hook_integration.py -v

      - name: PocketBase logs
        if: failure()
        run: docker logs mantly-pocketbase-hook-test

      - name: Stop PocketBase
        if: always()
        run: docker rm -f mantly-pocketbase-hook-test

  frontend-quality:
    name: Frontend quality (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [addin, admin, landing]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t isarai-test .
