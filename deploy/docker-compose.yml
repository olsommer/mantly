# Mantly — Commercial on-premise deployment
#
# This separately licensed customer package pulls pre-built images from the
# Mantly container registry. Community self-hosting instead uses the repository
# root docker-compose.community.yml and builds from source without a license key.
#
# Setup:
#   1. Copy .env.example to .env and fill in all values
#   2. docker compose up -d
#   3. Open https://<your-domain>/ to access the admin UI

services:

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN:-:80}"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  pocketbase:
    image: ${REGISTRY:-ghcr.io/isarlabs}/isarai-pocketbase:${VERSION:-latest}
    environment:
      PB_ADMIN_EMAIL: "${PB_ADMIN_EMAIL:?PB_ADMIN_EMAIL is required}"
      PB_ADMIN_PASSWORD: "${PB_ADMIN_PASSWORD:?PB_ADMIN_PASSWORD is required}"
    volumes:
      - pb_data:/pb/pb_data
    expose:
      - "8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  app:
    image: ${REGISTRY:-ghcr.io/isarlabs}/isarai-email-agent:${VERSION:-latest}
    environment:
      REQUIRE_AUTH: "true"
      IS_SAAS: "false"
      MANTLY_DEPLOYMENT_MODE: "dedicated"
      MANTLY_EDITION: "enterprise"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      CORS_ORIGINS: "${PUBLIC_URL}"
      MANIFEST_BASE_URL: "${PUBLIC_URL}"
      PB_PUBLIC_URL: "${PB_PUBLIC_URL:-${PUBLIC_URL}/pb}"
      ADDIN_ID: "${ADDIN_ID:?ADDIN_ID is required — generate with: python3 -c \"import uuid; print(uuid.uuid4())\"}"
      # License validation
      LICENSE_KEY: "${LICENSE_KEY:?LICENSE_KEY is required — contact support@mantly.io}"
      LICENSE_SERVER_URL: "${LICENSE_SERVER_URL:-https://api.mantly.io}"
      ENABLE_DEMO_MODE: "${ENABLE_DEMO_MODE:-false}"
      LICENSE_CACHE_PATH: "/app/data/license_cache.json"
      # Optional default LLM for self-hosted deployments. Tenants can still
      # configure BYOK in the admin UI.
      MANTLY_MANAGED_LLM_PROVIDER: "${MANTLY_MANAGED_LLM_PROVIDER:-gemini}"
      MANTLY_MANAGED_LLM_MODEL: "${MANTLY_MANAGED_LLM_MODEL:-gemini-3-flash-preview}"
      MANTLY_MANAGED_LLM_API_KEY: "${MANTLY_MANAGED_LLM_API_KEY:-}"
      MANTLY_MANAGED_LLM_CUSTOM_BASE_URL: "${MANTLY_MANAGED_LLM_CUSTOM_BASE_URL:-}"
      MANTLY_MANAGED_LLM_CUSTOM_MODEL: "${MANTLY_MANAGED_LLM_CUSTOM_MODEL:-}"
      LLM_PRICE_TABLE_JSON: "${LLM_PRICE_TABLE_JSON:-}"
      # Optional LangSmith tracing for response-agent / LangChain runs.
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGSMITH_ENDPOINT: "${LANGSMITH_ENDPOINT:-}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-}"
      # SMTP is used for auth mail and email-channel support replies.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      APP_BASE_URL: "${PUBLIC_URL}"
      SUPPORT_PUBLIC_BASE_URL: "${SUPPORT_PUBLIC_BASE_URL:-${PUBLIC_URL}}"
      # Support internal cron/API tokens and optional in-process schedulers.
      SUPPORT_SYNC_TOKEN: "${SUPPORT_SYNC_TOKEN:-}"
      SUPPORT_DELIVERY_TOKEN: "${SUPPORT_DELIVERY_TOKEN:-}"
      SUPPORT_CRM_SYNC_TOKEN: "${SUPPORT_CRM_SYNC_TOKEN:-}"
      SUPPORT_CRM_WEBHOOK_TOKEN: "${SUPPORT_CRM_WEBHOOK_TOKEN:-}"
      SUPPORT_SLA_TOKEN: "${SUPPORT_SLA_TOKEN:-}"
      SUPPORT_SYNC_INTERVAL_SECONDS: "${SUPPORT_SYNC_INTERVAL_SECONDS:-0}"
      SUPPORT_SYNC_TENANT_ID: "${SUPPORT_SYNC_TENANT_ID:-}"
      SUPPORT_SYNC_PROJECT_ID: "${SUPPORT_SYNC_PROJECT_ID:-}"
      SUPPORT_SYNC_LIMIT: "${SUPPORT_SYNC_LIMIT:-25}"
      SUPPORT_DELIVERY_INTERVAL_SECONDS: "${SUPPORT_DELIVERY_INTERVAL_SECONDS:-0}"
      SUPPORT_DELIVERY_TENANT_ID: "${SUPPORT_DELIVERY_TENANT_ID:-}"
      SUPPORT_DELIVERY_PROJECT_ID: "${SUPPORT_DELIVERY_PROJECT_ID:-}"
      SUPPORT_DELIVERY_LIMIT: "${SUPPORT_DELIVERY_LIMIT:-25}"
      SUPPORT_CRM_SYNC_INTERVAL_SECONDS: "${SUPPORT_CRM_SYNC_INTERVAL_SECONDS:-0}"
      SUPPORT_CRM_SYNC_TENANT_ID: "${SUPPORT_CRM_SYNC_TENANT_ID:-}"
      SUPPORT_CRM_SYNC_PROJECT_ID: "${SUPPORT_CRM_SYNC_PROJECT_ID:-}"
      SUPPORT_CRM_SYNC_LIMIT: "${SUPPORT_CRM_SYNC_LIMIT:-25}"
      SUPPORT_SLA_INTERVAL_SECONDS: "${SUPPORT_SLA_INTERVAL_SECONDS:-0}"
      SUPPORT_SLA_TENANT_ID: "${SUPPORT_SLA_TENANT_ID:-}"
      SUPPORT_SLA_PROJECT_ID: "${SUPPORT_SLA_PROJECT_ID:-}"
      SUPPORT_SLA_LIMIT: "${SUPPORT_SLA_LIMIT:-100}"
      # Channel secret fallbacks. Prefer storing per-project secrets in Admin
      # Settings when operators need tenant-specific values.
      SUPPORT_CHANNEL_WEBHOOK_TOKEN: "${SUPPORT_CHANNEL_WEBHOOK_TOKEN:-}"
      SUPPORT_SLACK_SIGNING_SECRET: "${SUPPORT_SLACK_SIGNING_SECRET:-}"
      SUPPORT_SLACK_WEBHOOK_TOKEN: "${SUPPORT_SLACK_WEBHOOK_TOKEN:-}"
      SUPPORT_SLACK_BOT_TOKEN: "${SUPPORT_SLACK_BOT_TOKEN:-}"
      SUPPORT_SLACK_CLIENT_ID: "${SUPPORT_SLACK_CLIENT_ID:-}"
      SUPPORT_SLACK_CLIENT_SECRET: "${SUPPORT_SLACK_CLIENT_SECRET:-}"
      SUPPORT_SLACK_OAUTH_STATE_SECRET: "${SUPPORT_SLACK_OAUTH_STATE_SECRET:-}"
      SUPPORT_SLACK_OAUTH_SCOPES: "${SUPPORT_SLACK_OAUTH_SCOPES:-}"
      SUPPORT_TEAMS_WEBHOOK_TOKEN: "${SUPPORT_TEAMS_WEBHOOK_TOKEN:-}"
      SUPPORT_TEAMS_APP_ID: "${SUPPORT_TEAMS_APP_ID:-}"
      SUPPORT_TEAMS_APP_PASSWORD: "${SUPPORT_TEAMS_APP_PASSWORD:-}"
      SUPPORT_DISCORD_WEBHOOK_TOKEN: "${SUPPORT_DISCORD_WEBHOOK_TOKEN:-}"
      SUPPORT_DISCORD_BOT_TOKEN: "${SUPPORT_DISCORD_BOT_TOKEN:-}"
      SUPPORT_TELEGRAM_WEBHOOK_TOKEN: "${SUPPORT_TELEGRAM_WEBHOOK_TOKEN:-}"
      SUPPORT_TELEGRAM_SECRET_TOKEN: "${SUPPORT_TELEGRAM_SECRET_TOKEN:-}"
      SUPPORT_TELEGRAM_BOT_TOKEN: "${SUPPORT_TELEGRAM_BOT_TOKEN:-}"
      SUPPORT_WHATSAPP_WEBHOOK_TOKEN: "${SUPPORT_WHATSAPP_WEBHOOK_TOKEN:-}"
      SUPPORT_WHATSAPP_VERIFY_TOKEN: "${SUPPORT_WHATSAPP_VERIFY_TOKEN:-}"
      SUPPORT_WHATSAPP_APP_SECRET: "${SUPPORT_WHATSAPP_APP_SECRET:-}"
      SUPPORT_WHATSAPP_ACCESS_TOKEN: "${SUPPORT_WHATSAPP_ACCESS_TOKEN:-}"
      SUPPORT_WHATSAPP_PHONE_NUMBER_ID: "${SUPPORT_WHATSAPP_PHONE_NUMBER_ID:-}"
      SUPPORT_MESSENGER_WEBHOOK_TOKEN: "${SUPPORT_MESSENGER_WEBHOOK_TOKEN:-}"
      SUPPORT_MESSENGER_VERIFY_TOKEN: "${SUPPORT_MESSENGER_VERIFY_TOKEN:-}"
      SUPPORT_MESSENGER_APP_SECRET: "${SUPPORT_MESSENGER_APP_SECRET:-}"
      SUPPORT_MESSENGER_PAGE_ACCESS_TOKEN: "${SUPPORT_MESSENGER_PAGE_ACCESS_TOKEN:-}"
      SUPPORT_MESSENGER_PAGE_ID: "${SUPPORT_MESSENGER_PAGE_ID:-}"
      SUPPORT_TWILIO_WEBHOOK_TOKEN: "${SUPPORT_TWILIO_WEBHOOK_TOKEN:-}"
      SUPPORT_TWILIO_ACCOUNT_SID: "${SUPPORT_TWILIO_ACCOUNT_SID:-}"
      SUPPORT_TWILIO_AUTH_TOKEN: "${SUPPORT_TWILIO_AUTH_TOKEN:-}"
      SUPPORT_TWILIO_FROM_NUMBER: "${SUPPORT_TWILIO_FROM_NUMBER:-}"
      SUPPORT_TWILIO_MESSAGING_SERVICE_SID: "${SUPPORT_TWILIO_MESSAGING_SERVICE_SID:-}"
      SUPPORT_BRIDGE_SIGNATURE_SECRET: "${SUPPORT_BRIDGE_SIGNATURE_SECRET:-}"
      SUPPORT_IMAP_PASSWORD: "${SUPPORT_IMAP_PASSWORD:-}"
      # PocketBase — connects over Docker's internal network
      PB_URL: "http://pocketbase:8090"
      PB_ADMIN_EMAIL: "${PB_ADMIN_EMAIL}"
      PB_ADMIN_PASSWORD: "${PB_ADMIN_PASSWORD}"
    depends_on:
      pocketbase:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  support-bridge:
    profiles: ["support-bridge"]
    image: ${REGISTRY:-ghcr.io/isarlabs}/isarai-email-agent:${VERSION:-latest}
    command: ["python", "-m", "automail.support.bridge_app"]
    environment:
      SUPPORT_BRIDGE_CORE_URL: "http://app:8080"
      SUPPORT_BRIDGE_PROJECT_ID: "${SUPPORT_BRIDGE_PROJECT_ID:-}"
      SUPPORT_BRIDGE_TENANT_ID: "${SUPPORT_BRIDGE_TENANT_ID:-}"
      SUPPORT_BRIDGE_TOKEN: "${SUPPORT_BRIDGE_TOKEN:-}"
      SUPPORT_BRIDGE_TOKEN_ENV: "${SUPPORT_BRIDGE_TOKEN_ENV:-}"
      SUPPORT_BRIDGE_TOKEN_HEADER: "${SUPPORT_BRIDGE_TOKEN_HEADER:-X-Support-Sync-Token}"
      SUPPORT_BRIDGE_INBOUND_TOKEN: "${SUPPORT_BRIDGE_INBOUND_TOKEN:-}"
      SUPPORT_BRIDGE_SIGNATURE_SECRET: "${SUPPORT_BRIDGE_SIGNATURE_SECRET:-}"
      SUPPORT_BRIDGE_SIGNATURE_SECRET_ENV: "${SUPPORT_BRIDGE_SIGNATURE_SECRET_ENV:-}"
      SUPPORT_BRIDGE_SIGNATURE_HEADER: "${SUPPORT_BRIDGE_SIGNATURE_HEADER:-X-Support-Signature}"
      SUPPORT_BRIDGE_SIGNATURE_TIMESTAMP_HEADER: "${SUPPORT_BRIDGE_SIGNATURE_TIMESTAMP_HEADER:-X-Support-Signature-Timestamp}"
      SUPPORT_BRIDGE_TIMEOUT_SECONDS: "${SUPPORT_BRIDGE_TIMEOUT_SECONDS:-15}"
      SUPPORT_SLACK_WEBHOOK_TOKEN: "${SUPPORT_SLACK_WEBHOOK_TOKEN:-}"
      SUPPORT_TEAMS_WEBHOOK_TOKEN: "${SUPPORT_TEAMS_WEBHOOK_TOKEN:-}"
      SUPPORT_DISCORD_WEBHOOK_TOKEN: "${SUPPORT_DISCORD_WEBHOOK_TOKEN:-}"
      SUPPORT_TELEGRAM_WEBHOOK_TOKEN: "${SUPPORT_TELEGRAM_WEBHOOK_TOKEN:-}"
      SUPPORT_WHATSAPP_WEBHOOK_TOKEN: "${SUPPORT_WHATSAPP_WEBHOOK_TOKEN:-}"
      SUPPORT_MESSENGER_WEBHOOK_TOKEN: "${SUPPORT_MESSENGER_WEBHOOK_TOKEN:-}"
      SUPPORT_TWILIO_WEBHOOK_TOKEN: "${SUPPORT_TWILIO_WEBHOOK_TOKEN:-}"
      SUPPORT_CHANNEL_WEBHOOK_TOKEN: "${SUPPORT_CHANNEL_WEBHOOK_TOKEN:-}"
    depends_on:
      app:
        condition: service_started
    ports:
      - "${SUPPORT_BRIDGE_PORT:-8095}:8095"
    restart: unless-stopped

  discord-gateway:
    profiles: ["discord-gateway"]
    image: ${REGISTRY:-ghcr.io/isarlabs}/isarai-email-agent:${VERSION:-latest}
    command: ["python", "-m", "automail.support.discord_gateway"]
    environment:
      SUPPORT_BRIDGE_CORE_URL: "http://app:8080"
      SUPPORT_BRIDGE_PROJECT_ID: "${SUPPORT_BRIDGE_PROJECT_ID:-}"
      SUPPORT_BRIDGE_TENANT_ID: "${SUPPORT_BRIDGE_TENANT_ID:-}"
      SUPPORT_BRIDGE_TOKEN: "${SUPPORT_BRIDGE_TOKEN:-}"
      SUPPORT_BRIDGE_TOKEN_ENV: "${SUPPORT_BRIDGE_TOKEN_ENV:-SUPPORT_DISCORD_WEBHOOK_TOKEN}"
      SUPPORT_BRIDGE_TOKEN_HEADER: "${SUPPORT_BRIDGE_TOKEN_HEADER:-X-Support-Sync-Token}"
      SUPPORT_BRIDGE_SIGNATURE_SECRET: "${SUPPORT_BRIDGE_SIGNATURE_SECRET:-}"
      SUPPORT_BRIDGE_SIGNATURE_SECRET_ENV: "${SUPPORT_BRIDGE_SIGNATURE_SECRET_ENV:-}"
      SUPPORT_BRIDGE_SIGNATURE_HEADER: "${SUPPORT_BRIDGE_SIGNATURE_HEADER:-X-Support-Signature}"
      SUPPORT_BRIDGE_SIGNATURE_TIMESTAMP_HEADER: "${SUPPORT_BRIDGE_SIGNATURE_TIMESTAMP_HEADER:-X-Support-Signature-Timestamp}"
      SUPPORT_BRIDGE_TIMEOUT_SECONDS: "${SUPPORT_BRIDGE_TIMEOUT_SECONDS:-15}"
      SUPPORT_BRIDGE_DISCORD_CHANNEL_KEY: "${SUPPORT_BRIDGE_DISCORD_CHANNEL_KEY:-discord-main}"
      SUPPORT_BRIDGE_DISCORD_BOT_TOKEN: "${SUPPORT_BRIDGE_DISCORD_BOT_TOKEN:-}"
      SUPPORT_BRIDGE_DISCORD_BOT_TOKEN_ENV: "${SUPPORT_BRIDGE_DISCORD_BOT_TOKEN_ENV:-SUPPORT_DISCORD_BOT_TOKEN}"
      SUPPORT_BRIDGE_DISCORD_GATEWAY_URL: "${SUPPORT_BRIDGE_DISCORD_GATEWAY_URL:-}"
      SUPPORT_BRIDGE_DISCORD_GATEWAY_EVENTS: "${SUPPORT_BRIDGE_DISCORD_GATEWAY_EVENTS:-}"
      SUPPORT_BRIDGE_DISCORD_GATEWAY_INTENTS: "${SUPPORT_BRIDGE_DISCORD_GATEWAY_INTENTS:-}"
      SUPPORT_BRIDGE_RECONNECT_SECONDS: "${SUPPORT_BRIDGE_RECONNECT_SECONDS:-5}"
      SUPPORT_DISCORD_WEBHOOK_TOKEN: "${SUPPORT_DISCORD_WEBHOOK_TOKEN:-}"
      SUPPORT_DISCORD_BOT_TOKEN: "${SUPPORT_DISCORD_BOT_TOKEN:-}"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pb_data:
  app_data:
