        Order ZF-20991 should contain 2 x BLUE-M, but the recipient received 2 x
        RED-XL. What photos and documents are needed? Confirm the correct
        replacement arrives tomorrow and that a warehouse ticket has been opened.
      attachments: []
    concerns:
      - key: wrong-item-evidence
        runbook_key: fulfillment-wrong-item
        answer_obligations:
          - State the evidence needed for warehouse verification.
          - Keep warehouse ticket and replacement pending.
    expected:
      minimum_concern_count: 1
      reply_disposition: draft
      grounding_status: passed
      approval_required: true
      single_combined_reply: true
      draft_count: 1
      queued_count: 0
      sent_count: 0
      must_cover:
        - Packaging, shipping-label, item, SKU, and quantity evidence.
      must_not_claim:
        - Opened warehouse ticket, approved replacement, stock, dispatch, or tomorrow delivery.
      knowledge_ids: [fulfillment-exceptions]
      tool_fixture_ids: [order-zf-20991]
      pending_actions: [open_warehouse_ticket, request_replacement]
      idempotency: *replay
  - id: E08
    title: Partial shipment
    inbound:
      from_name: Ava Thompson
      from_address: ava.thompson@example.test
      subject: Partial shipment for ZF-10482
      body: >-
        Order ZF-10482 has 3 units but only 1 arrived. Are there separate parcels
        or tracking numbers, or are units missing? Provide every confirmed
        tracking number and issue a refund today if there is no second parcel.
      attachments: []
    concerns:
      - key: partial-shipment-facts
        runbook_key: fulfillment-partial-shipment
        answer_obligations:
          - >-
            State ordered units, confirmed tracking numbers, and absence of a
            confirmed second parcel without concluding that units are missing.
      - key: refund-request
        runbook_key: fulfillment-partial-shipment
        answer_obligations:
          - Mark investigation and refund as pending rather than complete.
    expected:
      minimum_concern_count: 1
      reply_disposition: draft
      grounding_status: passed
      approval_required: true
      single_combined_reply: true
      draft_count: 1
      queued_count: 0
      sent_count: 0
      must_cover:
        - Three ordered units, one confirmed tracking number, and no confirmed second parcel.
      must_not_claim:
        - Missing-unit conclusion, second tracking number, approved refund, or refund today.
      knowledge_ids: []
      tool_fixture_ids: [order-zf-10482]
      pending_actions: [open_missing_unit_investigation, request_refund]
      idempotency: *replay
  - id: E09
