        dispatch, confirm SLA compensation, and state the exact data you need.
      attachments: []
    concerns:
      - key: b2b-launch-incident
        runbook_key: fulfillment-b2b-sla
        answer_obligations:
          - Address executive escalation, inventory and dispatch, SLA compensation, and required data separately.
    expected:
      minimum_concern_count: 1
      reply_disposition: draft
      grounding_status: passed
      approval_required: true
      single_combined_reply: true
      draft_count: 1
      queued_count: 0
      sent_count: 0
      must_cover:
        - Pending executive escalation, unconfirmed inventory and dispatch, unconfirmed SLA compensation, and exact triage data.
      must_not_claim:
        - Completed escalation, inventory guarantee, dispatch guarantee, SLA credit, or a sentence fragment.
      knowledge_ids: [fulfillment-b2b-sla]
      tool_fixture_ids: []
      pending_actions: [open_p1_incident, request_executive_escalation, request_sla_credit]
      idempotency: *replay
  - id: E10
