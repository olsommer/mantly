        - Do not ship yet, pending route and reference, and who controls refund timing.
      must_not_claim:
        - Return authorization, return address, refund approval, or Friday refund.
      knowledge_ids: [fulfillment-returns-refunds]
      tool_fixture_ids: [order-zf-20991]
      pending_actions: [request_return_authorization, request_refund]
      idempotency: *replay
