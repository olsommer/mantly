schema_version: 1
id: lawyer
name: Swiss law firm
case_id_prefix: L
description: >-
  A lawyer and legal-operations lead tests Mantly as the intake and support
  system for a Swiss commercial law firm.
operator:
  role: Partner responsible for intake and legal operations
  perspective: >-
    Protect confidentiality and professional duties while giving prospective
    and existing clients a precise, useful next step.
  goals:
    - Keep intake, conflicts, deadlines, billing, documents, and scheduling auditable.
    - Answer every customer question in one integrated response.
    - Use reviewed firm knowledge and verified matter facts without inventing legal conclusions.
  risk_boundaries:
    - Never imply mandate acceptance, conflict clearance, representation, or a legal outcome.
    - Never claim a deadline, appointment, billing exception, or operational action changed without proof.
    - Keep substantive discussion paused only as a pending human action unless verified complete.
business:
  name: Alpine Legal QA
  industry: Swiss commercial law firm
  locale: en-CH
  timezone: Europe/Zurich
test_policy:
  channel: email
  require_human_approval: true
  allow_external_send: false
  allow_external_actions: false
  require_grounding: true
  require_progress_audit: true
  require_idempotency_replay: true
  processing_stages:
    - runbooks
    - automation
    - triage
    - ticket_fields
    - composer
    - grounding
    - saving
    - finalizing
    - completed
seed:
  knowledge:
    - id: law-intake-conflicts
      title: QA Legal Intake and Conflict Checks
      body: |-
        SYNTHETIC QA KNOWLEDGE ONLY
        Before confidential facts or documents are accepted, collect the names of the prospective client, every adverse party, relevant affiliates, and a short non-confidential matter description. A conflict review is a human-controlled step. No mandate exists until the firm confirms clearance and both sides complete the engagement process. Do not give substantive advice during preliminary intake.
      tags: [qa, legal-intake, conflicts]
      visibility: public
      automation_allowed: true
      reviewed: true
      synthetic: true
    - id: law-fees-retainer
      title: QA Billing and Retainer Rules
      body: |-
        SYNTHETIC QA KNOWLEDGE ONLY
        The standard initial consultation fee is CHF 350 excluding VAT. The standard advance retainer is CHF 5,000 unless a lawyer approves another amount. Instalment plans, hardship waivers, due-date changes, and fee exceptions require human billing review and are not effective until explicitly approved.
      tags: [qa, billing, retainer]
      visibility: public
      automation_allowed: true
      reviewed: true
      synthetic: true
    - id: law-secure-documents
      title: QA Secure Document Submission
      body: |-
        SYNTHETIC QA KNOWLEDGE ONLY
        Prospective clients should upload readable copies through the secure intake portal after receiving an intake reference. Common PDF and image formats are accepted. Do not send irreplaceable originals by ordinary email or post. Keep originals safe and bring or deliver them only after a lawyer confirms the handling method. Submission does not mean the documents were reviewed or the matter was accepted.
      tags: [qa, documents, secure-intake]
      visibility: public
      automation_allowed: true
      reviewed: true
      synthetic: true
    - id: law-gmbh-formation
      title: QA Swiss GmbH Formation Overview
      body: |-
        SYNTHETIC QA KNOWLEDGE ONLY
        A preliminary Swiss GmbH formation discussion normally covers company name and domicile, founders and quota shares, management and signing authority, articles of association, capital payment evidence, notarial incorporation, and commercial-register filing. The statutory share capital is CHF 20,000 and must be fully paid in. Typical working documents include founder identification, address and purpose details, ownership information, draft articles, and capital confirmation. Name availability and engagement acceptance require separate verification.
      tags: [qa, gmbh, formation]
      visibility: public
      automation_allowed: true
      reviewed: true
      synthetic: true
    - id: law-consultation-scheduling
      title: QA Consultation Scheduling
      body: |-
        SYNTHETIC QA KNOWLEDGE ONLY
        A requested consultation time is only a preference until the calendar system or a human confirms it. Rescheduling requests should preserve the existing appointment, record the requested alternative, and remain pending human approval. Urgent deadline requests must be escalated without promising availability, representation, extensions, or outcomes.
      tags: [qa, consultation, scheduling]
      visibility: public
      automation_allowed: true
      reviewed: true
      synthetic: true
  tool_fixtures:
    - id: conflict-helvetia-pending
      tool: conflict_check_lookup
      input:
        parties: [Helvetia Systems AG, Helvetia Holdings SA]
      result:
        status: requires_human_review
        cleared: false
        reference: CONFLICT-QA-101
    - id: conflict-northlake-pending
      tool: conflict_check_lookup
      input:
        parties: [Northlake AG, Marco Steiner]
      result:
        status: possible_prior_relationship
        cleared: false
        reference: CONFLICT-QA-102
    - id: invoice-qa-law-204
      tool: invoice_lookup
      input:
        invoice_id: QA-LAW-204
      result:
        status: open
        due_date: "2026-07-25"
        currency: CHF
        payment_plan: null
        waiver: null
    - id: matter-mat-2026-104
      tool: matter_lookup
      input:
        matter_id: MAT-2026-104
      result:
        status: Awaiting counterparty response
        next_deadline: "2026-08-05"
        responsible_lawyer: Dr Nora Keller
    - id: matter-mat-2026-221
      tool: matter_lookup
      input:
        matter_id: MAT-2026-221
      result:
        status: open
        potential_conflict_status: pending_review
        substantive_discussion_paused: false
    - id: consultation-2026-07-21
      tool: calendar_lookup
      input:
        customer: Lukas Gerber
      result:
        current_start: "2026-07-21T14:00:00+02:00"
        requested_start: null
        confirmed: true
runbooks:
  - key: law-conflict-intake
    purpose: Collect non-confidential party data and prepare a human conflict review.
    proposed_actions: [open_conflict_review]
  - key: law-urgent-deadline
    purpose: Capture an asserted deadline and prepare urgent human triage.
    proposed_actions: [open_urgent_legal_triage]
  - key: law-secure-documents
    purpose: Explain safe document submission without claiming receipt or review.
    proposed_actions: [create_secure_intake_request]
  - key: law-billing-review
    purpose: Answer verified fee facts and prepare billing exceptions for review.
    proposed_actions: [request_payment_plan_review, request_waiver_review]
  - key: law-gmbh-formation
    purpose: Give reviewed general formation information and offer consultation intake.
    proposed_actions: [request_formation_consultation]
  - key: law-matter-status
    purpose: Retrieve approved matter facts for an authenticated existing client.
    proposed_actions: []
  - key: law-potential-conflict
    purpose: >-
      For an existing or open matter, record and escalate a newly reported
      potential conflict without drawing a conclusion.
    proposed_actions: [record_potential_conflict, open_conflict_review, pause_substantive_discussion]
  - key: law-consultation-reschedule
    purpose: Prepare an appointment change while preserving the confirmed booking.
    proposed_actions: [request_consultation_reschedule]
  - key: law-inheritance-intake
    purpose: Explain safe handling of original estate documents and open intake.
    proposed_actions: [create_secure_intake_request]
knowledge_checks:
  - id: K01
    question: >-
      Based only on reviewed knowledge and verified ticket facts: What are the
      standard consultation fee and retainer? What is invoice QA-LAW-204's
      recorded due date? Is any due-date change approved? Is any waiver approved?
    expected_citation_ids: [law-fees-retainer]
    must_cover:
      - Standard consultation fee and retainer.
      - Difference between the recorded invoice due date and an approved exception.
    must_mark_unverified:
      - Any payment plan, hardship waiver, due-date change, or mandate approval.
    create_draft: false
cases:
  - id: L01
    title: New client intake and conflict check
    inbound:
      from_name: Sophie Mueller
      from_address: sophie.mueller@example.test
      subject: New client intake and conflict check
      body: >-
        I may need advice about a failed software implementation. Opposing party
        Helvetia Systems AG and parent Helvetia Holdings SA. Before confidential
        facts or documents, explain the intake and conflict-check process. Do not
        imply mandate acceptance or give substantive advice.
      attachments: []
    concerns:
      - key: confidential-intake
        runbook_key: law-conflict-intake
        answer_obligations:
          - >-
            Explain the non-confidential intake requirements and make clear that
            conflict clearance and engagement acceptance remain pending.
    expected:
      minimum_concern_count: 1
      reply_disposition: draft
      grounding_status: passed
      approval_required: true
      single_combined_reply: true
      draft_count: 1
      queued_count: 0
      sent_count: 0
      must_cover:
        - Names and non-confidential facts needed for conflict review.
        - Safe next step before documents or substantive facts are shared.
      must_not_claim:
        - Conflict clearance, mandate acceptance, confidentiality, or substantive advice.
      knowledge_ids: [law-intake-conflicts]
      tool_fixture_ids: [conflict-helvetia-pending]
      pending_actions: [open_conflict_review]
      idempotency: &replay
        processed_on_replay: 0
        skipped_on_replay: 1
        state_unchanged: true
  - id: L02
    title: Adverse-party conflict check before disclosure
    inbound:
      from_name: Daniel Frei
      from_address: daniel.frei@example.test
      subject: Adverse-party conflict check before disclosure
      body: >-
        I am considering a claim against Northlake AG and shareholder Marco
